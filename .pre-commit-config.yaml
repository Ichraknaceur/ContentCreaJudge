# Note: This file applies to the Python project template itself.
# Projects generated from this template will have their own version of this file.

# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

exclude: ^(\.pre-commit-cache|\.uv-cache)/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: name-tests-test

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: ["-L", "complet,mot,reste,valide"]
        exclude: ^(\.pre-commit-cache/|\.pytest_cache/|\.ruff_cache/|\.uv-cache/|docs/(CADRAGE_EQUIPE|RULES_CONFIGURATION)\.md$|src/contentcreajudge/judges/tone/tone_prompt\.py$|src/contentcreajudge/rules/judges/tone/tone\.yaml$)

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.2
    hooks:
      - id: uv-lock

  - repo: https://github.com/owenlamont/uv-secure
    rev: 0.17.0
    hooks:
      - id: uv-secure
        # GHSA-69w3-r845-3855: transformers<5.0.0 via sentence-transformers — fix is 5.0.0rc3 (RC only, not stable yet)
        args: [ --show-severity, --ignore-unfixed, --severity=medium, --ignore-vulns, GHSA-69w3-r845-3855 ]

  - repo: https://github.com/checkmake/checkmake.git
    rev: v0.3.2
    hooks:
      - id: checkmake
